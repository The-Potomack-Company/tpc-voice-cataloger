<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>TPC · Unified UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=EB+Garamond:ital,wght@0,400;1,400;1,500&family=Playfair+Display:ital,wght@0,400;1,400;1,500&family=Fraunces:ital,opsz,wght@0,14..144,400;1,14..144,400;1,14..144,500&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Light — cool near-white */
    --bg: oklch(0.985 0.003 240);
    --bg-2: oklch(0.97 0.004 240);
    --bg-3: oklch(0.945 0.005 240);
    --rule: oklch(0.9 0.006 240);
    --rule-2: oklch(0.82 0.008 240);
    --ink: oklch(0.22 0.02 255);
    --ink-2: oklch(0.4 0.015 255);
    --ink-3: oklch(0.56 0.012 255);
    --ink-4: oklch(0.7 0.01 255);

    /* Accent — teal-blue */
    --accent: oklch(0.58 0.13 225);
    --accent-hover: oklch(0.52 0.13 225);
    --accent-wash: oklch(0.95 0.03 225);
    --accent-ink: oklch(0.98 0.008 225);

    /* Secondary — warm sand for viz */
    --sand: oklch(0.72 0.09 75);
    --sand-wash: oklch(0.95 0.03 75);

    --ok: oklch(0.55 0.1 155);
    --ok-wash: oklch(0.95 0.03 155);
    --warn: oklch(0.62 0.11 75);
    --warn-wash: oklch(0.95 0.035 80);
    --err: oklch(0.55 0.13 28);
    --err-wash: oklch(0.95 0.03 28);

    --font-display: "EB Garamond", "Iowan Old Style", Georgia, serif;
    --font-ui: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, Menlo, monospace;

    --radius-sm: 4px;
    --radius: 6px;
    --radius-lg: 10px;
  }
  .tpc-dark {
    --bg: oklch(0.19 0.015 255);
    --bg-2: oklch(0.22 0.016 255);
    --bg-3: oklch(0.26 0.018 255);
    --rule: oklch(0.3 0.018 255);
    --rule-2: oklch(0.38 0.02 255);
    --ink: oklch(0.97 0.008 240);
    --ink-2: oklch(0.82 0.012 240);
    --ink-3: oklch(0.65 0.014 240);
    --ink-4: oklch(0.5 0.014 240);
    --accent: oklch(0.72 0.13 225);
    --accent-hover: oklch(0.78 0.13 225);
    --accent-wash: oklch(0.32 0.05 225);
    --accent-ink: oklch(0.16 0.02 255);
    --ok-wash: oklch(0.3 0.04 155);
    --warn-wash: oklch(0.3 0.04 80);
    --err-wash: oklch(0.3 0.05 28);
    --sand-wash: oklch(0.3 0.04 75);
  }

  html, body { margin:0; padding:0; background:#efeeea; font-family: var(--font-ui); color: var(--ink); -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  .tnum { font-variant-numeric: tabular-nums; font-feature-settings: "tnum" 1; }

  .tpc { background: var(--bg); color: var(--ink); font-family: var(--font-ui); font-size: 13px; }
  .tpc-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }
  .tpc-display { font-family: var(--font-display); font-weight: 400; font-style: italic; letter-spacing: -0.01em; }

  .tpc-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    padding: 6px 12px; border-radius: var(--radius); font-size: 12.5px; font-weight: 500;
    font-family: var(--font-ui); line-height: 1.1; cursor: pointer;
    border: 1px solid transparent; transition: background .12s, border-color .12s, color .12s;
    white-space: nowrap;
  }
  .tpc-btn-primary { background: var(--accent); color: var(--accent-ink); }
  .tpc-btn-primary:hover { background: var(--accent-hover); }
  .tpc-btn-secondary { background: var(--bg); color: var(--ink); border-color: var(--rule-2); }
  .tpc-btn-secondary:hover { background: var(--bg-2); }
  .tpc-btn-ghost { background: transparent; color: var(--ink-2); }
  .tpc-btn-ghost:hover { background: var(--bg-2); color: var(--ink); }
  .tpc-btn-danger { background: transparent; color: var(--err); border-color: color-mix(in oklch, var(--err) 40%, transparent); }
  .tpc-btn-danger:hover { background: var(--err-wash); }

  .tpc-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 1px 7px; border-radius: 4px; font-size: 10.5px; font-weight: 500;
    background: var(--bg-3); color: var(--ink-2); line-height: 1.6;
    font-variant-numeric: tabular-nums;
  }
  .tpc-badge-ok { background: var(--ok-wash); color: var(--ok); }
  .tpc-badge-warn { background: var(--warn-wash); color: var(--warn); }
  .tpc-badge-err { background: var(--err-wash); color: var(--err); }
  .tpc-badge-info { background: var(--accent-wash); color: var(--accent); }
  .tpc-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background: currentColor; }

  .tpc-input {
    width: 100%; padding: 6px 10px; background: var(--bg); border: 1px solid var(--rule-2);
    border-radius: var(--radius); font-family: var(--font-ui); font-size: 13px; color: var(--ink);
    outline: none; transition: border-color .12s, box-shadow .12s;
  }
  .tpc-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-wash); }

  .tpc-card { background: var(--bg); border: 1px solid var(--rule); border-radius: var(--radius-lg); }

  .hide-scroll::-webkit-scrollbar { display: none; }
  .hide-scroll { scrollbar-width: none; }

  .tpc-placeholder {
    background-image: repeating-linear-gradient(135deg,
      var(--bg-3) 0, var(--bg-3) 6px,
      var(--bg-2) 6px, var(--bg-2) 12px);
    color: var(--ink-3); font-family: var(--font-mono); font-size: 10px;
    display:flex; align-items:center; justify-content:center; border-radius: var(--radius);
    border: 1px solid var(--rule);
  }

  .tpc-kbd {
    font-family: var(--font-mono); font-size: 10px; color: var(--ink-3);
    background: var(--bg-2); border: 1px solid var(--rule); padding: 1px 5px; border-radius: 3px;
  }

  /* Dataviz */
  .bar-track { height: 4px; background: var(--bg-3); border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>

<script type="text/babel" src="tpc-primitives.jsx"></script>
<script type="text/babel" src="tpc-icons.jsx"></script>
<script type="text/babel" src="tpc-icons-showcase.jsx"></script>
<script type="text/babel" src="tpc-foundations.jsx"></script>
<script type="text/babel" src="tpc-extension.jsx"></script>

<script type="text/babel" src="app.jsx"></script>
</body>
</html>
